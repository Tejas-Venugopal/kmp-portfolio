name: Build & Verify

# Run on every push and pull-request to main.
# Netlify handles actual deployment; this workflow just guards code quality.
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-wasm:
    name: Kotlin/Wasm Production Build
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── 3. Cache Gradle wrapper + caches ─────────────────────────────────────
      - name: Cache Gradle files
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── 4. Make gradlew executable (Linux requires this) ─────────────────────
      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # ── 5. Build Wasm production bundle ──────────────────────────────────────
      - name: Build wasmJsBrowserDistribution
        run: ./gradlew :composeApp:wasmJsBrowserDistribution --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dkotlin.native.ignoreDisabledTargets=true"

      # ── 6. Verify output exists ───────────────────────────────────────────────
      - name: Verify build output
        run: |
          echo "── Production executable contents ──"
          ls -lh composeApp/build/dist/wasmJs/productionExecutable/
          test -f composeApp/build/dist/wasmJs/productionExecutable/index.html
          test -f composeApp/build/dist/wasmJs/productionExecutable/composeApp.wasm
          echo "✅ All required files present"

      # ── 7. Upload dist as artifact (optional — useful for inspection) ─────────
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-dist-${{ github.sha }}
          path: composeApp/build/dist/wasmJs/productionExecutable/
          retention-days: 7

