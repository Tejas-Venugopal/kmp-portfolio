<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Android &amp; KMP Engineer — Portfolio</title>
    <meta name="description" content="Tejas Venugopal — Android &amp; KMP Engineer. 3+ years building production Android apps with Kotlin, Jetpack Compose and MVI architecture."/>
    <meta property="og:title" content="Tejas Venugopal — Android &amp; KMP Engineer"/>
    <meta property="og:description" content="Portfolio built with Kotlin Multiplatform + Compose Multiplatform + Wasm"/>
    <meta property="og:url" content="https://tejasvenugopal.netlify.app"/>
    <style>
        /* Reset margins/padding so the Compose canvas truly fills the viewport. */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000000;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* The canvas Compose/Wasm renders into. Stretch to viewport. */
        #composeApplication {
            display: block;
            width: 100vw;
            height: 100vh;
            outline: none;
            position: relative;   /* establish stacking context          */
            z-index: 1;           /* sit above the animated-banner <img>  */
        }

        /* ---------- Custom scrollbar (Chrome / Safari / Edge) ---------- */
        /* Thin emerald-on-black rail to match the portfolio palette. */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #000000;
        }
        ::-webkit-scrollbar-thumb {
            background: #00FF88;
            border-radius: 0; /* keep it sharp / minimal */
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #33FFA1;
        }
        ::-webkit-scrollbar-corner {
            background: #000000;
        }

        /* Firefox equivalent — uses the same palette. */
        * {
            scrollbar-width: thin;
            scrollbar-color: #00FF88 #000000;
        }
    </style>
</head>
<body>
    <canvas id="composeApplication"></canvas>

    <!-- Resize the canvas to match the device pixel ratio for crisp rendering. -->
    <script type="application/javascript">
        (function () {
            const canvas = document.getElementById("composeApplication");
            function resize() {
                const dpr = window.devicePixelRatio || 1;
                canvas.width = Math.floor(window.innerWidth * dpr);
                canvas.height = Math.floor(window.innerHeight * dpr);
                canvas.style.width = window.innerWidth + "px";
                canvas.style.height = window.innerHeight + "px";
            }
            window.addEventListener("resize", resize);
            resize();
        })();
    </script>

    <!-- Compose/Wasm bootstrap script generated by the Kotlin/Wasm Gradle plugin. -->
    <script type="application/javascript" src="composeApp.js"></script>
</body>
</html>
