# ──────────────────────────────────────────────────────────────────────────────
# Netlify configuration for KMP Portfolio (Kotlin/Wasm)
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/
# ──────────────────────────────────────────────────────────────────────────────

[build]
  # Shell command Netlify runs to produce the site.
  # Netlify CI runs on Ubuntu, so use ./gradlew (not gradlew.bat).
  command = "export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64 && export PATH=$JAVA_HOME/bin:$PATH && java -version && chmod +x ./gradlew && ./gradlew :composeApp:wasmJsBrowserDistribution"

  # Folder that contains the finished website after the build command finishes.
  publish = "composeApp/build/dist/wasmJs/productionExecutable"

[build.environment]
  # Force Java 17 — Netlify now defaults to Java 25, which Kotlin 2.0.x cannot parse.
  JAVA_VERSION      = "17"
  GRADLE_USER_HOME   = "/opt/buildhome/.gradle"
  GRADLE_OPTS        = "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Xmx4g"
  KOTLIN_NATIVE_IGNORE_DISABLED_TARGETS = "true"

# ── Cache the Gradle wrapper + dependency cache between builds ─────────────────
[build.processing]
  skip_processing = false

[cache]
  paths = ["/opt/buildhome/.gradle/wrapper", "/opt/buildhome/.gradle/caches"]

# ── HTTP headers ──────────────────────────────────────────────────────────────
# Browsers require application/wasm for WebAssembly files.
# Netlify does NOT set this automatically — we must declare it here.

[[headers]]
  for = "/*.wasm"
  [headers.values]
    Content-Type = "application/wasm"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Redirect all paths to index.html (SPA behaviour) ─────────────────────────
# Ensures deep-links / refreshes don't 404 on Netlify's CDN.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

