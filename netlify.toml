# ──────────────────────────────────────────────────────────────────────────────
# Netlify configuration for KMP Portfolio (Kotlin/Wasm)
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/
# ──────────────────────────────────────────────────────────────────────────────

[build]
  # Netlify's current build image defaults to Java 25 which Kotlin 2.0.x rejects.
  # JAVA_VERSION env var is not reliably honoured, so we install JDK 21 manually.
  # Using a PINNED direct GitHub release URL (far more stable than api.adoptium.net).
  command = """mkdir -p /tmp/jdk21 && \
curl -fsSL 'https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.6%2B7/OpenJDK21U-jdk_x64_linux_hotspot_21.0.6_7.tar.gz' \
     -o /tmp/jdk21.tar.gz && \
tar -xzf /tmp/jdk21.tar.gz -C /tmp/jdk21 --strip-components=1 && \
export JAVA_HOME=/tmp/jdk21 && \
export PATH=$JAVA_HOME/bin:$PATH && \
java -version && \
chmod +x ./gradlew && \
./gradlew :composeApp:wasmJsBrowserDistribution"""

  # Folder that contains the finished website after the build command finishes.
  publish = "composeApp/build/dist/wasmJs/productionExecutable"

[build.environment]
  GRADLE_USER_HOME  = "/opt/buildhome/.gradle"
  GRADLE_OPTS       = "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.jvmargs=-Xmx4g"
  KOTLIN_NATIVE_IGNORE_DISABLED_TARGETS = "true"

# ── Cache the Gradle wrapper + dependency cache between builds ─────────────────
[build.processing]
  skip_processing = false

[cache]
  paths = ["/opt/buildhome/.gradle/wrapper", "/opt/buildhome/.gradle/caches", "/tmp/jdk21"]

# ── HTTP headers ──────────────────────────────────────────────────────────────
# Browsers require application/wasm for WebAssembly files.
# Netlify does NOT set this automatically — we must declare it here.

[[headers]]
  for = "/*.wasm"
  [headers.values]
    Content-Type = "application/wasm"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Redirect all paths to index.html (SPA behaviour) ─────────────────────────
# Ensures deep-links / refreshes don't 404 on Netlify's CDN.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

